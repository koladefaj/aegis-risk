syntax = "proto3";

package aegis.risk_engine;

import "common.proto";

service RiskEngineService {
  rpc EvaluateRisk(EvaluateRiskRequest) returns (EvaluateRiskResponse);
  rpc GetRiskResult(GetRiskResultRequest) returns (GetRiskResultResponse);

  // Server-streaming — streams LLM explanation tokens via SSE
  rpc StreamExplanation(StreamExplanationRequest) returns (stream ExplanationChunk);

  rpc HealthCheck(aegis.common.HealthCheckRequest) returns (aegis.common.HealthCheckResponse);
}

message StreamExplanationRequest {
  aegis.common.RequestMetadata metadata = 1;
  string transaction_id = 2;
}

// Streaming chunk message
message ExplanationChunk {
  string transaction_id = 1;
  string chunk_type = 2;     // "token", "risk_factors", "recommendation", "done", "error"
  string content = 3;
  int32 index = 4;
}

message EvaluateRiskRequest {
  aegis.common.RequestMetadata metadata = 1;
  string transaction_id = 2;
  double amount = 3;
  string currency = 4;
  string sender_id = 5;
  string receiver_id = 6;
  string sender_country = 7;
  string receiver_country = 8;
  string device_fingerprint = 9;
  string ip_address = 10;
  string channel = 11;
  string created_at = 12;
}

// ── Inline risk factor for sync response ─────────────────────────────────────
message RiskFactor {
  string factor = 1;    // "HIGH_VELOCITY", "AMOUNT_ANOMALY" etc.
  string severity = 2;  // "HIGH", "MEDIUM", "LOW"
  string detail = 3;    // "8 transactions in 1 hour"
}

message RuleFlagResult {
  string rule_name = 1;
  bool triggered = 2;
  double score = 3;
  string reason = 4;
}

message EvaluateRiskResponse {
  string transaction_id = 1;
  string decision = 2;              // "APPROVE", "BLOCK", "REVIEW"
  double risk_score = 3;            // 0.0 - 1.0
  string risk_level = 4;            // "LOW", "MEDIUM", "HIGH", "CRITICAL"
  string confidence = 5;            // "HIGH", "MEDIUM", "LOW"
  repeated RiskFactor risk_factors = 6;  // human-readable reasons for bank
  double processing_time_ms = 7;
  string model_version = 8;
}

message GetRiskResultResponse {
  string transaction_id = 1;
  string decision = 2;
  double risk_score = 3;
  string risk_level = 4;
  repeated RiskFactor risk_factors = 5;        
  repeated RuleFlagResult rule_flags = 6;
  double ml_anomaly_score = 7;
  bool ml_fallback_used = 8;
  string ml_model_version = 9;
  string llm_summary = 10;
  repeated string llm_risk_factors = 11;
  string llm_recommendation = 12;
  bool llm_fallback_used = 13;
  double processing_time_ms = 14;
  string worker_id = 15;
  string evaluated_at = 16;
}

message GetRiskResultRequest {
  aegis.common.RequestMetadata metadata = 1;
  string transaction_id = 2;
}

