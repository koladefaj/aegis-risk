syntax = "proto3";

package aegis.risk_engine;

import "common.proto";

service RiskEngineService {
  rpc EvaluateRisk(EvaluateRiskRequest) returns (EvaluateRiskResponse);
  rpc GetRiskResult(GetRiskResultRequest) returns (GetRiskResultResponse);

  // Server-streaming — streams LLM explanation tokens via SSE
  rpc StreamExplanation(StreamExplanationRequest) returns (stream ExplanationChunk);

  rpc HealthCheck(aegis.common.HealthCheckRequest) returns (aegis.common.HealthCheckResponse);
}

message StreamExplanationRequest {
  aegis.common.RequestMetadata metadata = 1;
  string transaction_id = 2;
}

// Streaming chunk message
message ExplanationChunk {
  string transaction_id = 1;
  string chunk_type = 2;     // "token", "risk_factors", "recommendation", "done", "error"
  string content = 3;
  int32 index = 4;
}

message EvaluateRiskRequest {
  aegis.common.RequestMetadata metadata = 1;
  string transaction_id = 2;
  double amount = 3;
  string currency = 4;
  string sender_id = 5;
  string receiver_id = 6;
  string sender_country = 7;
  string receiver_country = 8;
  string device_fingerprint = 9;
  string ip_address = 10;
  string channel = 11;
  string created_at = 12;
}

message RuleFlagResult {
  string rule_name = 1;
  bool triggered = 2;
  double score = 3;
  string reason = 4;
}

message EvaluateRiskResponse {
  string transaction_id = 1;
  double risk_score = 2;
  string risk_level = 3;
  repeated RuleFlagResult rule_flags = 4;
  double ml_anomaly_score = 5;
  bool ml_fallback_used = 6;
  string ml_model_version = 7;
  string llm_summary = 8;
  repeated string llm_risk_factors = 9;
  string llm_recommendation = 10;
  bool llm_fallback_used = 11;
  double processing_time_ms = 12;
  string worker_id = 13;
  string evaluated_at = 14;
}

message GetRiskResultRequest {
  aegis.common.RequestMetadata metadata = 1;
  string transaction_id = 2;
}

message GetRiskResultResponse {
  string transaction_id = 1;
  double risk_score = 2;
  string risk_level = 3;
  repeated RuleFlagResult rule_flags = 4;
  double ml_anomaly_score = 5;
  string llm_summary = 6;
  string evaluated_at = 7;
}
