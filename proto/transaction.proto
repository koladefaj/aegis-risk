syntax = "proto3";

package aegis.transaction;

import "common.proto";

service TransactionService {
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  rpc GetTransaction(GetTransactionRequest) returns (GetTransactionResponse);
  rpc UpdateTransactionStatus(UpdateStatusRequest) returns (UpdateStatusResponse);
  rpc HealthCheck(aegis.common.HealthCheckRequest) returns (aegis.common.HealthCheckResponse);
}

message CreateTransactionRequest {
  aegis.common.RequestMetadata metadata = 1;
  string idempotency_key = 2;
  string amount = 3;
  string currency = 4;
  string sender_id = 5;
  string receiver_id = 6;
  string sender_country = 7;
  string receiver_country = 8;
  string device_fingerprint = 9;
  string ip_address = 10;
  string channel = 11;
}

// Inline risk factor — returned to bank in sync response
message RiskFactor {
  string factor = 1;    // "HIGH_VELOCITY", "NEW_ACCOUNT", etc.
  string severity = 2;  // "HIGH", "MEDIUM", "LOW"
  string detail = 3;
}

message CreateTransactionResponse {
  string transaction_id = 1;
  string idempotency_key = 2;
  string amount = 3;
  string currency = 4;
  string sender_id = 5;
  string receiver_id = 6;
  string sender_country = 7;
  string receiver_country = 8;
  string status = 9;
  string created_at = 10;
  bool already_existed = 11;
  string decision = 12;       // "APPROVE", "BLOCK", "REVIEW"
  double risk_score = 13;
  string risk_level = 14;     // "LOW", "MEDIUM", "HIGH", "CRITICAL"
  repeated RiskFactor risk_factors = 15;  // ✅ repeated message, not JSON string
}

message GetTransactionRequest {
  aegis.common.RequestMetadata metadata = 1;
  string transaction_id = 2;
}

message GetTransactionResponse {
  string transaction_id = 1;
  string idempotency_key = 2;
  string amount = 3;
  string currency = 4;
  string sender_id = 5;
  string receiver_id = 6;
  string sender_country = 7;
  string receiver_country = 8;
  string status = 9;
  string created_at = 10;
  string updated_at = 11;
}

message UpdateStatusRequest {
  aegis.common.RequestMetadata metadata = 1;
  string transaction_id = 2;
  string new_status = 3;
  string reason = 4;
}

message UpdateStatusResponse {
  string transaction_id = 1;
  string previous_status = 2;
  string new_status = 3;
  bool success = 4;
}